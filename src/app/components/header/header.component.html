<header class="bg-slate-900 border-b border-slate-800 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between gap-4">
        <!-- Logo -->
        <a routerLink="/" class="flex items-center gap-2 text-xl font-bold text-white tracking-wider">
            <span class="text-purple-500">🔮</span> Magic<span class="text-indigo-400">Finance</span>
        </a>

        <!-- Search Bar -->
        <div class="relative flex-1 max-w-md">
            <input type="text" [(ngModel)]="searchQuery" (input)="onSearchInput()"
                placeholder="Rechercher une carte (EN/FR)..."
                class="w-full bg-slate-950 text-slate-100 placeholder-slate-500 rounded-lg px-4 py-2 border border-slate-700 focus:outline-none focus:border-indigo-500 transition" />

            @if (suggestions().length > 0) {
            <ul
                class="absolute w-full bg-slate-900 border border-slate-700 rounded-lg mt-1 shadow-2xl max-h-60 overflow-y-auto z-50">
                @for (suggestion of suggestions(); track suggestion) {
                <li (click)="selectCard(suggestion)"
                    class="px-4 py-2.5 hover:bg-indigo-600/30 hover:text-white cursor-pointer text-slate-300 transition text-sm flex items-center justify-between">
                    <span>{{ suggestion }}</span>
                    <span class="text-xs text-slate-500">Scryfall ↗</span>
                </li>
                }
            </ul>
            }
        </div>
    </div>
</header>
